services:
  - type: web
    name: semas-casa-abrigo
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    branch: main
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://semas-casa-abrigo.onrender.com
      - key: APP_LOCALE
        value: pt_BR
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: CORS_ALLOWED_ORIGINS
        value: https://semas-casa-abrigo.vercel.app
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: aws-1-sa-east-1.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        value: postgres.dflxtsbnfjqjwuvdfogp
      - key: DB_SSLMODE
        value: require
      - key: ADMIN_NAME
        value: Administrador SEMAS
      - key: ADMIN_EMAIL
        value: admin@semas.sbs.gov.br
      - key: DB_PASSWORD
        sync: false
      - key: APP_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
